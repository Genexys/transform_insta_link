services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: transform_insta_link
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '54329:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d transform_insta_link']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
